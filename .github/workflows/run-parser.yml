name: Run Blogger Parser

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-parser:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run parser
      run: python3 blogger_parser.py --output blog_posts.json

    - name: Commit and push JSON to repository
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add blog_posts.json blog_posts_summary.json
        git diff --staged --quiet || git commit -m "blog: обновление постов от $(date +%Y-%m-%d)"
        git push
